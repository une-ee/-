<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>판화 시뮬레이션</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel (브라우저에서 JSX 컴파일) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- ES Modules Import Map (React, Lucide, Firebase) -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
      }
    }
  </script>

  <!-- 글로벌 CSS 스타일 (기존 JSX 내장 스타일 통합) -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
    
    * { 
      font-family: 'Jua', sans-serif !important; 
      font-weight: 400 !important; 
      letter-spacing: 0.03em; 
    }
    
    @keyframes popIn { 
      0% { transform: scale(0.5); opacity: 0; } 
      70% { transform: scale(1.1); opacity: 1; } 
      100% { transform: scale(1); opacity: 1; } 
    }
    @keyframes floatUp { 
      0% { transform: translateY(20px); opacity: 0; } 
      100% { transform: translateY(0); opacity: 1; } 
    }
    @keyframes fadeIn { 
      0% { opacity: 0; backdrop-filter: blur(0px); } 
      100% { opacity: 1; backdrop-filter: blur(2px); } 
    }
    
    .animate-popIn { animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .animate-floatUp { animation: floatUp 0.5s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
    .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
    
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #a8a29e; }
  </style>
</head>
<body class="bg-[#FDFBF7] m-0 p-0 overflow-hidden">
  
  <div id="root"></div>

  <!-- React 앱 메인 로직 -->
  <script type="text/babel" data-type="module">
    import React, { useState, useRef, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Home, Eraser, Droplet, Printer, RotateCcw, Paintbrush, ArrowRight, PaintBucket, Hand, ArrowRightLeft, ArrowDownUp, PartyPopper, LogIn, Users, Filter, LogOut, Lock, Camera, ImagePlus, X, FileText, Trash2, Archive, CheckCircle } from 'lucide-react';
    
    // --- Firebase Init ---
    import { initializeApp } from "firebase/app";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "firebase/auth";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "firebase/firestore";
    
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-printmaking-app';
    
    // 제공할 잉크 색상 팔레트
    const INK_COLORS = [
      { id: 'black', hex: '#222222', name: '검은색' },
      { id: 'red', hex: '#E63946', name: '빨간색' },
      { id: 'blue', hex: '#1D3557', name: '파란색' },
      { id: 'green', hex: '#2A9D8F', name: '초록색' },
      { id: 'yellow', hex: '#E9C46A', name: '노란색' }
    ];
      
    // 판화 종류별 속성 정의
    const PRINT_TYPES = {
      relief: {
        id: 'relief', name: '볼록판화', subtitle: '조각칼로 파내기',
        desc: '조각칼로 파낸 부분은 하얗게 남고, 볼록하게 남은 부분에 잉크가 묻어 찍히는 판화입니다.',
        steps: ['make', 'ink', 'print'],
        stepDocs: {
          make: { tool: '조각칼', title: '판 만들기', desc: '조각칼을 쥐고 판을 파내어 잉크가 묻지 않을 부분의 밑그림을 그리세요.' },
          ink: { tool: '롤러', title: '잉크 바르기', desc: '잉크 색상을 고르고 롤러로 꼼꼼히 문질러 볼록한 곳에 잉크를 묻히세요.' },
          print: { tool: '바렌', title: '찍어내기', desc: '종이를 덮고 바렌으로 마우스를 골고루 둥글게 문질러 잉크를 찍어내세요!' }
        },
        colors: { makeBg: '#A0522D', makeLine: '#D2B48C', printBg: '#FDFBF7' },
        lineWidthMult: 0.04
      },
      intaglio: {
        id: 'intaglio', name: '오목판화', subtitle: '동판에 흠집 내기',
        desc: '동판에 흠집을 내고 잉크를 채운 뒤 표면을 닦아내어, 오목하게 패인 곳의 잉크가 찍히는 판화입니다.',
        steps: ['make', 'ink', 'wipe', 'print'],
        stepDocs: {
          make: { tool: '니들(송곳)', title: '판 만들기', desc: '니들을 쥐고 동판에 흠집을 내어 밑그림을 그리세요.' },
          ink: { tool: '롤러', title: '잉크 듬뿍 바르기', desc: '판 전체에 잉크가 흠집 속까지 스며들도록 빈틈없이 까맣게 덮어주세요.' },
          wipe: { tool: '헝겊', title: '잉크 닦아내기', desc: '헝겊으로 표면을 문질러 닦아내면 흠집(선) 안에만 잉크가 남습니다. (덜 닦으면 종이가 더러워져요!)' },
          print: { tool: '프레스기', title: '프레스기로 찍기', desc: '판과 종이를 올리고 프레스기 손잡이를 끝까지 돌려 완성하세요!' }
        },
        colors: { makeBg: '#B0C4DE', makeLine: '#708090', printBg: '#FDFBF7' },
        lineWidthMult: 0.015
      },
      plano: {
        id: 'plano', name: '평판화', subtitle: '물과 기름의 반발',
        desc: '물과 기름이 섞이지 않는 원리를 이용합니다. 기름진 크레용으로 그린 부분에만 잉크가 묻어 찍힙니다.',
        steps: ['make', 'gum', 'ink', 'print'],
        stepDocs: {
          make: { tool: '리소크레용', title: '판 만들기', desc: '크레용을 쥐고 기름진 성분의 그림을 그리세요.' },
          gum: { tool: '고무액(붓)', title: '아라비아 고무액 바르기', desc: '붓으로 아라비아 고무액을 빈틈없이 발라, 그림이 없는 부분의 친수성(물을 좋아하는 성질)을 높여줍니다.' },
          ink: { tool: '롤러', title: '잉크 바르기', desc: '판 위에 잉크 롤러를 굴려 크레용 자국에만 잉크를 붙이세요.' },
          print: { tool: '프레스기', title: '프레스기로 찍기', desc: '판과 종이를 올리고 프레스기 손잡이를 끝까지 돌려 완성하세요!' }
        },
        colors: { makeBg: '#E9E5CE', makeLine: '#444444', printBg: '#FDFBF7' },
        lineWidthMult: 0.025
      },
      stencil: {
        id: 'stencil', name: '공판화', subtitle: '여러 판 겹쳐 찍기',
        desc: '판을 여러 개 만들어 원하는 색상별로 겹쳐 찍어내면 다채롭고 멋진 다색 판화 작품이 완성됩니다.',
        steps: ['frame', 'make', 'print'], 
        stepDocs: {
          frame: { tool: '타카(건타카)', title: '실크 틀 씌우기', desc: '화면 아래의 실크천을 마우스로 드래그하여 나무 틀 위에 덮고, 타카를 클릭해 모서리 곳곳을 팽팽하게 고정하세요.' },
          make: { tool: '감광액(붓)', title: '감광액 바르기', desc: '잉크가 찍히지 않을 여백이 될 부분에 초록색 감광액을 바르세요. 감광액이 발린 곳은 잉크가 막혀 통과하지 못합니다.' },
          print: { tool: '스퀴지', title: '찍어내기', desc: '원하는 잉크 색상을 고르고 스퀴지를 밑으로 쭉 밀어내세요. 감광액이 없는 빈 공간으로만 잉크가 밀려 찍힙니다!' }
        },
        colors: { makeBg: '#5E86C1', makeLine: '#E2E8F0', printBg: '#FDFBF7' },
        lineWidthMult: 0.05
      }
    };
      
    // --- 도구 디자인 (SVG) 컴포넌트 ---
    const ToolIcons = {
      '조각칼': () => ( <svg viewBox="0 0 100 100" width="60" height="60" className="drop-shadow-lg -translate-x-1 -translate-y-1"><path d="M 20 20 L 40 10 L 45 40 Z" fill="#9CA3AF" /><rect x="35" y="30" width="15" height="50" rx="5" fill="#8B4513" transform="rotate(-30 40 40)" /><circle cx="20" cy="20" r="3" fill="#D1D5DB" /></svg> ),
      '니들(송곳)': () => ( <svg viewBox="0 0 100 100" width="60" height="60" className="drop-shadow-lg -translate-x-1 -translate-y-1"><path d="M 10 10 L 25 35 L 30 30 Z" fill="#D1D5DB" /><rect x="25" y="25" width="10" height="60" rx="3" fill="#374151" transform="rotate(-45 30 30)" /></svg> ),
      '리소크레용': () => ( <svg viewBox="0 0 100 100" width="50" height="50" className="drop-shadow-lg -translate-x-2 -translate-y-2"><path d="M 10 10 L 30 20 L 20 30 Z" fill="#1F2937" /><rect x="15" y="15" width="20" height="50" fill="#E5E7EB" transform="rotate(-45 25 25)" /><rect x="15" y="45" width="20" height="20" fill="#1F2937" transform="rotate(-45 25 25)" /></svg> ),
      '감광액(붓)': () => ( <svg viewBox="0 0 100 100" width="60" height="60" className="drop-shadow-lg -translate-x-1 -translate-y-1"><rect x="35" y="40" width="30" height="50" rx="5" fill="#8B4513" /><path d="M 20 20 L 80 20 L 70 40 L 30 40 Z" fill="#D1D5DB" /><path d="M 20 20 Q 50 0 80 20 Z" fill="#10B981" /><path d="M 40 25 L 40 35 M 50 22 L 50 35 M 60 25 L 60 35" stroke="#34D399" strokeWidth="2" strokeLinecap="round" /></svg> ),
      '고무액(붓)': () => ( <svg viewBox="0 0 100 100" width="60" height="60" className="drop-shadow-lg -translate-x-1 -translate-y-1"><rect x="35" y="40" width="30" height="50" rx="5" fill="#8B4513" /><path d="M 20 20 L 80 20 L 70 40 L 30 40 Z" fill="#D1D5DB" /><path d="M 20 20 Q 50 0 80 20 Z" fill="#FCD34D" /><path d="M 40 25 L 40 35 M 50 22 L 50 35 M 60 25 L 60 35" stroke="#F59E0B" strokeWidth="2" strokeLinecap="round" /></svg> ),
      '롤러': ({ color }) => ( <svg viewBox="0 0 100 100" width="80" height="80" className="drop-shadow-xl -translate-x-1/2 -translate-y-1/2"><rect x="40" y="50" width="20" height="40" rx="5" fill="#B45309" /><path d="M 50 50 L 50 30 L 20 30 L 20 15 M 50 30 L 80 30 L 80 15" stroke="#94A3B8" strokeWidth="6" fill="none" strokeLinejoin="round" /><rect x="10" y="5" width="80" height="25" rx="5" fill={color} /><rect x="10" y="15" width="80" height="5" fill="#ffffff" opacity="0.2" /></svg> ),
      '바렌': () => ( <svg viewBox="0 0 100 100" width="80" height="80" className="drop-shadow-xl -translate-x-1/2 -translate-y-1/2"><circle cx="50" cy="50" r="40" fill="#FDE68A" /><path d="M 20 30 Q 50 50 80 30 M 20 50 Q 50 70 80 50 M 20 70 Q 50 90 80 70" stroke="#D97706" strokeWidth="2" fill="none" opacity="0.5" /><rect x="40" y="30" width="20" height="40" rx="10" fill="none" stroke="#B45309" strokeWidth="6" /></svg> ),
      '헝겊': () => ( <svg viewBox="0 0 100 100" width="70" height="70" className="drop-shadow-xl -translate-x-1/2 -translate-y-1/2"><path d="M 15 45 Q 25 15 50 25 T 85 35 Q 95 65 75 75 T 25 80 Z" fill="#E5E7EB" stroke="#D1D5DB" strokeWidth="2" /><path d="M 25 35 Q 50 45 75 40 M 35 55 Q 55 65 80 55" stroke="#9CA3AF" strokeWidth="3" fill="none" strokeLinecap="round" /><path d="M 45 25 L 55 75" stroke="#D1D5DB" strokeWidth="2" fill="none" strokeDasharray="4 4" /></svg> ),
      '스펀지': () => ( <svg viewBox="0 0 100 100" width="70" height="70" className="drop-shadow-xl -translate-x-1/2 -translate-y-1/2"><rect x="20" y="30" width="60" height="40" rx="10" fill="#FCD34D" stroke="#D97706" strokeWidth="2" /><circle cx="35" cy="45" r="4" fill="#D97706" opacity="0.4" /><circle cx="65" cy="40" r="3" fill="#D97706" opacity="0.4" /><circle cx="50" cy="55" r="5" fill="#D97706" opacity="0.4" /><circle cx="30" cy="60" r="3" fill="#D97706" opacity="0.4" /><circle cx="70" cy="60" r="4" fill="#D97706" opacity="0.4" /><circle cx="55" cy="40" r="3" fill="#D97706" opacity="0.4" /></svg> ),
      '타카(건타카)': () => ( <svg viewBox="0 0 100 100" width="65" height="65" className="drop-shadow-lg -translate-x-1 -translate-y-1"><path d="M 15 30 L 75 30 L 75 45 L 15 45 Z" fill="#1F2937" rx="5" /><path d="M 15 45 L 85 45 L 85 80 L 70 80 L 70 60 L 15 60 Z" fill="#DC2626" /><rect x="70" y="80" width="15" height="5" fill="#9CA3AF" /><circle cx="25" cy="52" r="3" fill="#FCA5A5" /></svg> )
    };
      
    function App() {
      const [view, setView] = useState('login'); // login -> home(student) or admin(teacher) -> workshop
      const [activeType, setActiveType] = useState(null);
      const [currentStepIndex, setCurrentStepIndex] = useState(0);
      
      // --- Auth & Admin State ---
      const [fbUser, setFbUser] = useState(null);
      const [role, setRole] = useState(null); // 'student' | 'teacher'
      const [studentId, setStudentId] = useState('');
      const [loginInput, setLoginInput] = useState('');
      const [loginError, setLoginError] = useState('');
      const [submissions, setSubmissions] = useState([]);
      const [adminFilter, setAdminFilter] = useState('all');
      const [classFilter, setClassFilter] = useState('all');
     
      // --- Assessment State ---
      const [assessments, setAssessments] = useState([]);
      const [adminTab, setAdminTab] = useState('simulation'); // 'simulation' | 'assessment'
      const [uploadImage, setUploadImage] = useState(null);
      const [uploadTitle, setUploadTitle] = useState('');
      const [uploadMeaning, setUploadMeaning] = useState('');
      const [selectedAssessment, setSelectedAssessment] = useState(null);
      const [deleteTarget, setDeleteTarget] = useState(null); // 커스텀 삭제 모달 상태
     
      // --- Workshop State ---
      const [isSubmitted, setIsSubmitted] = useState(false);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [artworkTitle, setArtworkTitle] = useState(''); // 작품명 상태 추가
      const [myWorks, setMyWorks] = useState([]); // 나의 작업함 상태
      const [currentWorkId, setCurrentWorkId] = useState(null); // 현재 작업 중인 문서 ID
      const [editingTitles, setEditingTitles] = useState({}); // 작업함 내 제목 수정 상태
     
      const [stencilState, setStencilState] = useState({ clothPlaced: false, tacks: [] });
      const [lines, setLines] = useState([]);
      const [gumLines, setGumLines] = useState([]); 
      const [inkLines, setInkLines] = useState([]);
      const [wipeLines, setWipeLines] = useState([]); 
      const [printLines, setPrintLines] = useState([]); 
      const [stencilLayers, setStencilLayers] = useState([]); 
      
      const [printProgress, setPrintProgress] = useState(0); 
      const [printPhase, setPrintPhase] = useState('idle'); 
      const [finalImage, setFinalImage] = useState(null); 
      
      const [pressState, setPressState] = useState({ platePlaced: false, paperPlaced: false });
      const [dragItem, setDragItem] = useState(null);
      const [dragDelta, setDragDelta] = useState({x: 0, y: 0});
      const dragStartPos = useRef({x: 0, y: 0});
      const isCompletingRef = useRef(false); // 중복 저장 방지용 잠금 장치 추가
      
      const [selectedColor, setSelectedColor] = useState(INK_COLORS[0].hex);
      const [brushSize, setBrushSize] = useState(1);
      const [isDrawing, setIsDrawing] = useState(false);
      const [isHoveringCanvas, setIsHoveringCanvas] = useState(false);
      const [useMouseTracker, setUseMouseTracker] = useState(true);
      
      const canvasRef = useRef(null);
      const cursorRef = useRef(null);
      
      const currentConfig = activeType ? PRINT_TYPES[activeType] : null;
      const stepsList = currentConfig ? currentConfig.steps : [];
      const currentStep = stepsList[currentStepIndex];
      
      const isPressActive = (activeType === 'intaglio' || activeType === 'plano') && currentStep === 'print' && printPhase !== 'done';
     
      // --- Firebase Initialization & Auth ---
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
              await signInWithCustomToken(auth, window.__initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (err) { console.error("Auth init error", err); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setFbUser);
        return () => unsubscribe();
      }, []);
     
      // --- Fetch Submissions for Admin & MyWorks for Student ---
      useEffect(() => {
        if (!fbUser) return;
        
        let unsub1 = () => {}, unsub2 = () => {}, unsub3 = () => {};
     
        if (view === 'admin') {
          const q1 = collection(db, 'artifacts', appId, 'public', 'data', 'submissions');
          unsub1 = onSnapshot(q1, (snap) => {
            const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            // Sort by timestamp descending
            data.sort((a, b) => b.timestamp - a.timestamp);
            setSubmissions(data);
          }, (error) => console.error("Fetch error:", error));
     
          const q2 = collection(db, 'artifacts', appId, 'public', 'data', 'assessments');
          unsub2 = onSnapshot(q2, (snap) => {
            const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            data.sort((a, b) => b.timestamp - a.timestamp);
            setAssessments(data);
          }, (error) => console.error("Fetch error:", error));
        }
     
        if (role === 'student' && studentId) {
          const q3 = collection(db, 'artifacts', appId, 'public', 'data', 'myWorks');
          unsub3 = onSnapshot(q3, (snap) => {
            const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            data.sort((a, b) => b.timestamp - a.timestamp);
            setMyWorks(data.filter(w => w.studentId === studentId));
          }, (error) => console.error("Fetch error:", error));
        }
     
        return () => { unsub1(); unsub2(); unsub3(); };
      }, [fbUser, view, role, studentId]);
     
      // --- Login Handler ---
      const handleLogin = (e) => {
        e.preventDefault();
        setLoginError('');
        const input = loginInput.trim();
     
        if (input === 'dhrwjdwndart') {
          setRole('teacher');
          setView('admin');
          return;
        }
     
        // 학생 학번 검증 (3학년, 1~11반, 1~31번)
        const studentRegex = /^3(0[1-9]|1[0-1])(0[1-9]|[1-2][0-9]|3[0-1])$/;
        if (studentRegex.test(input)) {
          setRole('student');
          setStudentId(input);
          setView('home');
        } else {
          setLoginError("올바른 학번(예: 30101) 또는 교사 비밀번호를 입력해주세요.");
        }
      };
     
      const handleLogout = () => {
        setRole(null);
        setStudentId('');
        setLoginInput('');
        setView('login');
        resetStates();
      };
      
      const resetStates = () => {
        setCurrentStepIndex(0);
        setStencilState({ clothPlaced: false, tacks: [] });
        setLines([]); setGumLines([]); setInkLines([]); setWipeLines([]); setPrintLines([]);
        setStencilLayers([]); 
        setPrintProgress(0); setPrintPhase('idle'); setFinalImage(null);
        setPressState({ platePlaced: false, paperPlaced: false });
        setDragItem(null); setDragDelta({x:0, y:0});
        setSelectedColor(INK_COLORS[0].hex);
        setBrushSize(1);
        setIsSubmitted(false);
        setIsSubmitting(false);
        setArtworkTitle(''); 
        setCurrentWorkId(null); 
        isCompletingRef.current = false; 
      };
      
      const goHome = () => { setView('home'); resetStates(); };

          } 
          else if (activeType === 'plano') {
            drawAllLines(tempCtx, lines, selectedColor, currentConfig.lineWidthMult, width);
            const inkMaskCanvas = document.createElement('canvas'); inkMaskCanvas.width = width; inkMaskCanvas.height = height;
            drawAllLines(inkMaskCanvas.getContext('2d'), inkLines, '#000', 0.15, width);
            tempCtx.globalCompositeOperation = 'destination-in'; tempCtx.drawImage(inkMaskCanvas, 0, 0);
          }
          else if (activeType === 'stencil') {

                }).catch(err => console.error("Update error:", err));

            const MAX_WIDTH = 800;
            let scaleSize = 1;
            if (img.width > MAX_WIDTH) {

            }
            canvas.width = img.width * scaleSize;
            canvas.height = img.height * scaleSize;

      const handleStart = (e) => {

      const handlePressItemDragStart = (e, item) => {

        if (Math.abs(delta) > 3) {
          setPrintProgress(prev => {
            const newVal = Math.min(1, Math.max(0, prev + delta * 0.005));
            if (newVal >= 1 && prev < 1) setTimeout(triggerComplete, 300); 
            return newVal;
          });
          dragStartPos.current = {x: e.clientX, y: e.clientY};
        }

        if (toolName === '타카(건타카)' && currentStep === 'frame' && !stencilState.clothPlaced) return null; 
        const ToolIcon = ToolIcons[toolName];
        if (!ToolIcon) return null;
        return <ToolIcon color={currentStep === 'ink' ? selectedColor : undefined} />;
      };

                      <div className={`absolute bottom-[10%] right-[10%] z-50 w-[30%] aspect-square rounded-full border-[12px] md:border-[16px] border-stone-800 flex items-center justify-center shadow-2xl transition-transform duration-75 ${pressState.paperPlaced ? (dragItem === 'wheel' ? 'cursor-grabbing' : 'cursor-grab hover:scale-105') : 'cursor-not-allowed opacity-50'}`}
                           style={{ transform: `rotate(${printProgress * 360}deg)` }}
                           onPointerDown={pressState.paperPlaced ? handleWheelStart : undefined} onPointerMove={pressState.paperPlaced ? handleWheelMove : undefined} onPointerUp={handleWheelEnd} onPointerCancel={handleWheelEnd}>
                        <div className="w-full h-6 bg-stone-800 absolute"></div><div className="w-6 h-full bg-stone-800 absolute"></div>
                        <div className="w-10 h-10 rounded-full bg-stone-900 z-30 shadow-inner border-2 border-stone-700"></div>
                        <div className="absolute top-[-16px] left-1/2 -translate-x-1/2 w-8 h-8 rounded-full bg-amber-600 border-2 border-amber-800"></div>
                      </div>
                    </div>
                  )}
                </div>
              </div>
       
              <div className="bg-[#5C3A21] px-6 py-3 rounded-xl border-b-4 border-[#3A2211] shadow-xl flex items-center gap-6 shrink-0" style={{ width: '100%', maxWidth: 'min(100%, 65vh)' }}>
                <span className="text-[#D2B48C] text-lg shrink-0">내 도구함</span>
                <div className="flex gap-4 items-end h-16 w-full justify-start overflow-hidden">
                  {stepsList.map(step => {
                    const toolName = currentConfig.stepDocs[step].tool;
                    const ToolIcon = ToolIcons[toolName];
                    if (!ToolIcon) return null;
                    return (
                      <div key={step} className={`transition-transform duration-300 ${currentStep === step && !isHoveringCanvas ? '-translate-y-4 scale-110 drop-shadow-2xl' : 'opacity-50 grayscale'}`}>
                        <ToolIcon color={(step === 'ink' || (activeType === 'stencil' && step === 'print')) ? selectedColor : undefined} />
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
       
            <div className="w-[320px] lg:w-[420px] flex flex-col justify-center h-full py-2 shrink-0">
              <div className="bg-[#FDFBF7] rounded-r-3xl rounded-l-md p-6 lg:p-8 shadow-2xl border-l-[12px] border-stone-300 relative flex flex-col max-h-full overflow-hidden">
                <div className="absolute left-[-18px] top-10 bottom-10 flex flex-col justify-between opacity-50 pointer-events-none">
                  {[...Array(10)].map((_, i) => <div key={i} className="w-8 h-4 border-4 border-stone-400 rounded-full" />)}
                </div>
       
                <h3 className="text-3xl text-stone-800 mb-4 border-b-2 border-stone-200 pb-4 shrink-0">작업 순서서</h3>
                
                <div className="flex-1 overflow-y-auto space-y-4 pr-2 custom-scrollbar">
                  {stepsList.map((step, index) => {
                    const doc = currentConfig.stepDocs[step];
                    const isActive = currentStep === step;
                    const isPast = currentStepIndex > index;
                    const stateClass = isActive ? 'opacity-100 scale-[1.02] origin-left' : (isPast ? 'opacity-60' : 'opacity-40 grayscale');
       
                    return (
                      <div key={step} className={`transition-all duration-300 ${stateClass}`}>
                        <div className="flex items-center gap-2 text-2xl text-stone-800 mb-2">
                          <span className={`w-8 h-8 flex justify-center items-center rounded-full text-lg text-white ${isActive ? 'bg-stone-800' : 'bg-stone-400'}`}>{index + 1}</span>
                          {doc.title}
                        </div>
                        <div className="bg-stone-100 p-4 rounded-lg border border-stone-200 space-y-3 shadow-inner ml-3">
                          <p className="text-xl text-stone-600 leading-relaxed"><strong className="text-stone-800 bg-stone-200 px-2 py-1 rounded">{doc.tool}</strong> {doc.desc}</p>
                          
                          {step === 'make' && isActive && (
                            <div className="flex items-center gap-2 mt-3 bg-white/60 p-2 rounded-lg border border-stone-200 inline-flex shadow-sm">
                              <span className="text-stone-600 text-sm font-bold mx-1">굵기</span>
                              {[
                                { id: 0.5, label: '얇게', dot: 'w-2 h-2' },
                                { id: 1.0, label: '보통', dot: 'w-3 h-3' },
                                { id: 1.5, label: '굵게', dot: 'w-5 h-5' }
                              ].map(size => (
                                <button
                                  key={size.id}
                                  onClick={() => setBrushSize(size.id)}
                                  className={`flex items-center gap-1 px-3 py-1.5 rounded-md transition-all ${brushSize === size.id ? 'bg-stone-800 text-white shadow-md' : 'bg-white text-stone-500 hover:bg-stone-100 border border-stone-200'}`}
                                >
                                  <span className={`bg-current rounded-full ${size.dot}`}></span>
                                  <span className="text-sm">{size.label}</span>
                                </button>
                              ))}
                            </div>
                          )}
      
                          {(step === 'ink' || (activeType === 'stencil' && step === 'print')) && isActive && (
                            <div className="flex gap-3 mt-3">
                              {INK_COLORS.map(color => (
                                <button key={color.id} onClick={() => setSelectedColor(color.hex)} className={`w-10 h-10 rounded-full shadow-inner border-2 transition-transform ${selectedColor === color.hex ? 'scale-110 border-stone-800' : 'border-stone-300'}`} style={{ backgroundColor: color.hex }} />
                              ))}
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
       
                <div className="mt-6 shrink-0 flex flex-col gap-3">
                  {printPhase === 'done' ? (
                    <>
                      {/* 학생 제출 영역: 작품명 입력 칸 추가 */}
                      {role === 'student' && (
                        !isSubmitted ? (
                          <div className="flex flex-col gap-2 bg-stone-100 p-3 rounded-xl border border-stone-200">
                            <input
                              type="text"
                              placeholder="작품명을 지어주세요 (선택)"
                              value={artworkTitle}
                              onChange={(e) => setArtworkTitle(e.target.value)}
                              maxLength={20}
                              className="w-full px-4 py-3 text-xl bg-white border-2 border-stone-300 rounded-xl focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 transition-all text-center placeholder-stone-400"
                            />
                            <button 
                              onClick={handleSubmitToTeacher} 
                              disabled={isSubmitting}
                              className="w-full py-3 rounded-xl text-2xl text-white bg-emerald-600 hover:bg-emerald-700 shadow-md transition-all active:scale-95 flex items-center justify-center gap-2"
                            >
                              {isSubmitting ? '제출 중...' : '📤 선생님께 작품 제출'}
                            </button>
                          </div>
                        ) : (
                          <div className="w-full py-4 rounded-xl text-2xl text-white bg-emerald-500 font-bold text-center shadow-inner flex items-center justify-center gap-2">
                            ✅ 제출 완료!
                          </div>
                        )
                      )}
                      {activeType === 'stencil' && (
                        <button onClick={handleAddStencilPlate} className="w-full py-4 rounded-xl text-2xl text-white bg-blue-500 hover:bg-blue-600 shadow-lg hover:shadow-xl transition-all active:scale-95 animate-popIn">
                          ➕ 다른 색상으로 새 판 겹쳐 찍기
                        </button>
                      )}
                      <button onClick={resetStates} className="w-full py-4 rounded-xl text-2xl text-stone-800 bg-amber-300 hover:bg-amber-400 shadow-lg hover:shadow-xl transition-all active:scale-95 animate-pulse">
                        ✨ 작품 초기화 후 새로 시작
                      </button>
                    </>
                  ) : currentStep !== 'print' ? (
                    <button
                      onClick={nextStep}
                      disabled={ 
                        (currentStep === 'frame' && (!stencilState.clothPlaced || stencilState.tacks.length < 4)) || 
                        (currentStep === 'make' && lines.length === 0) || 
                        (currentStep === 'gum' && gumLines.length === 0) || 
                        (currentStep === 'ink' && inkLines.length === 0) || 
                        (currentStep === 'wipe' && wipeLines.length === 0) 
                      }
                      className={`w-full py-4 rounded-xl text-2xl text-white shadow-md transition-all ${ 
                        ((currentStep === 'frame' && (!stencilState.clothPlaced || stencilState.tacks.length < 4)) || (currentStep === 'make' && lines.length === 0) || (currentStep === 'gum' && gumLines.length === 0) || (currentStep === 'ink' && inkLines.length === 0) || (currentStep === 'wipe' && wipeLines.length === 0)) ? 'bg-stone-300 cursor-not-allowed' : 'bg-stone-800 hover:bg-stone-900 active:scale-95' 
                      }`}
                    >
                      다음 단계로 이동 
                    </button>
                  ) : null}
                </div>
              </div>
            </div>
          </main>
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
